<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Procto App</title>
<!-- PWA meta tags -->
<meta name="application-name" content="Procto App"/>
<meta name="apple-mobile-web-app-title" content="Procto App"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0F172A"/>
<meta name="description" content="Project & Task Monitoring Dashboard"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  :root {
    --navy:#0F172A; --bg:#F8FAFC; --card:#FFFFFF;
    --sky:#38BDF8; --sky-dark:#0EA5E9;
    --red:#EE1C25; --red-dark:#CC1720;
    --green:#16A34A; --amber:#CA8A04; --blue:#2563EB;
    --text:#1E293B; --sub:#64748B; --border:#E2E8F0;
    --hdr-h:62px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);
       min-height:100vh;padding-top:var(--hdr-h);}

  /* ── HEADER ── */
  header{
    background:var(--navy);
    padding:0 24px;
    height:var(--hdr-h);
    display:flex;align-items:center;justify-content:space-between;
    position:fixed;top:0;left:0;right:0;z-index:200;
    box-shadow:0 2px 16px rgba(0,0,0,.45);
  }
  .brand{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .brand img{width:34px;height:34px;object-fit:contain;border-radius:7px;}
  .brand-name{color:#fff;font-size:1.18rem;font-weight:800;letter-spacing:.4px;white-space:nowrap;}
  .brand-name span{color:var(--sky);}

  .header-right{display:flex;align-items:center;gap:8px;flex-wrap:nowrap;overflow-x:auto;}
  .header-right::-webkit-scrollbar{display:none;}

  .search-wrap{position:relative;flex-shrink:0;}
  .search-wrap input{
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
    border-radius:8px;color:#fff;padding:7px 12px 7px 34px;
    font-size:.82rem;width:200px;outline:none;transition:border .2s,width .2s;
  }
  .search-wrap input::placeholder{color:rgba(255,255,255,.38);}
  .search-wrap input:focus{border-color:var(--sky);width:230px;}
  .si{position:absolute;left:10px;top:50%;transform:translateY(-50%);
      color:rgba(255,255,255,.38);font-size:.88rem;pointer-events:none;}

  select.fsel{
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);
    border-radius:8px;color:#fff;padding:7px 10px;font-size:.79rem;outline:none;cursor:pointer;
    flex-shrink:0;
  }
  select.fsel option{background:#1e293b;color:#fff;}

  /* divider in header */
  .hdr-div{width:1px;height:28px;background:rgba(255,255,255,.12);flex-shrink:0;}

  .btn{border:none;border-radius:8px;padding:7px 13px;font-size:.8rem;font-weight:700;cursor:pointer;
       transition:all .18s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;}
  .btn-sky{background:var(--sky);color:#0F172A;}
  .btn-sky:hover{background:var(--sky-dark);}
  .btn-red{background:var(--red);color:#fff;}
  .btn-red:hover{background:var(--red-dark);}
  .btn-ghost{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);}
  .btn-ghost:hover{background:rgba(255,255,255,.18);}
  .btn-outline{background:#f1f5f9;color:#334155;border:1px solid #e2e8f0;}
  .btn-outline:hover{background:#e2e8f0;}
  /* Install button — hidden until beforeinstallprompt fires */
  #installBtn{
    display:none;background:linear-gradient(135deg,#38BDF8,#0EA5E9);
    color:#0F172A;border:none;border-radius:8px;padding:7px 13px;
    font-size:.8rem;font-weight:700;cursor:pointer;
    align-items:center;gap:5px;white-space:nowrap;flex-shrink:0;
    box-shadow:0 0 0 0 rgba(56,189,248,.6);
    animation:pulse 2.2s infinite;
  }
  #installBtn:hover{background:linear-gradient(135deg,#0EA5E9,#0284C7);}
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(56,189,248,.5);}
    50%{box-shadow:0 0 0 6px rgba(56,189,248,0);}
  }

  /* ── KPI ── */
  .kpi-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;padding:20px 24px 0;}
  .kpi-tile{background:var(--card);border-radius:14px;padding:18px 20px;
            box-shadow:0 1px 5px rgba(0,0,0,.07);display:flex;align-items:center;gap:14px;
            border-left:5px solid transparent;transition:transform .15s,box-shadow .15s;}
  .kpi-tile:hover{transform:translateY(-2px);box-shadow:0 4px 18px rgba(0,0,0,.1);}
  .kpi-tile.t-pending{border-color:var(--amber);}
  .kpi-tile.t-inprog {border-color:var(--blue);}
  .kpi-tile.t-done   {border-color:var(--green);}
  .kpi-tile.t-overdue{border-color:var(--red);}
  .kpi-icon{font-size:1.85rem;}
  .kpi-info label{font-size:.7rem;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;display:block;}
  .kpi-val{font-size:2rem;font-weight:900;line-height:1;}
  .t-pending .kpi-val{color:var(--amber);}
  .t-inprog  .kpi-val{color:var(--blue);}
  .t-done    .kpi-val{color:var(--green);}
  .t-overdue .kpi-val{color:var(--red);}

  /* ── MAIN ── */
  .main{padding:16px 24px 40px;}

  /* ── KANBAN SECTION ── */
  .ks{margin-bottom:18px;border-radius:14px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.07);}
  .sh{display:flex;align-items:center;justify-content:space-between;
      padding:13px 20px;font-weight:700;font-size:.9rem;cursor:pointer;user-select:none;}
  .sh-left{display:flex;align-items:center;gap:9px;}
  .scnt{background:rgba(0,0,0,.2);border-radius:20px;padding:2px 9px;font-size:.74rem;}
  .chevron{font-size:.78rem;transition:transform .25s;}
  .sh.collapsed .chevron{transform:rotate(-90deg);}
  .ks-pending .sh{background:#854D0E;color:#FEF9C3;}
  .ks-inprog  .sh{background:#1D4ED8;color:#DBEAFE;}
  .ks-done    .sh{background:#15803D;color:#DCFCE7;}
  .sb{background:#F8FAFC;padding:14px;display:flex;flex-wrap:wrap;gap:12px;border-top:1px solid var(--border);}
  .sb.collapsed{display:none;}
  .empty-msg{color:var(--sub);font-size:.82rem;font-style:italic;width:100%;text-align:center;padding:14px 0;}

  /* ── TASK CARD ── */
  .tc{background:#fff;border:1px solid var(--border);border-radius:12px;padding:15px 16px;
      width:calc(33.333% - 8px);min-width:268px;box-shadow:0 1px 4px rgba(0,0,0,.06);
      transition:box-shadow .2s,transform .15s;position:relative;}
  .tc:hover{box-shadow:0 5px 20px rgba(0,0,0,.11);transform:translateY(-2px);}
  .tc.closed .ttl{text-decoration:line-through;color:var(--sub);}
  .tc.closed{opacity:.62;}
  .tc.overdue-c{border-left:4px solid var(--red);}
  .ct{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
  .ttl{font-weight:700;font-size:.9rem;flex:1;line-height:1.35;}
  .ub{font-size:.67rem;font-weight:700;border-radius:5px;padding:2px 8px;
      text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;margin-left:6px;}
  .ul{background:#DCFCE7;color:#16A34A;}
  .um{background:#FEF9C3;color:#CA8A04;}
  .uh{background:#FEE2E2;color:#DC2626;}
  .uc{background:#EE1C25;color:#fff;}
  .tmeta{font-size:.72rem;color:var(--sub);margin-bottom:7px;}
  .tdesc{font-size:.8rem;color:#475569;margin-bottom:9px;line-height:1.45;}
  .catb{display:inline-block;background:#F1F5F9;color:#475569;border-radius:5px;
        padding:2px 8px;font-size:.7rem;font-weight:600;margin-bottom:8px;}
  .dr{display:flex;gap:12px;font-size:.71rem;color:var(--sub);margin-bottom:8px;flex-wrap:wrap;}
  .pw{margin-bottom:10px;}
  .pl{display:flex;justify-content:space-between;font-size:.71rem;color:var(--sub);margin-bottom:4px;}
  .pt{height:7px;background:#E2E8F0;border-radius:10px;overflow:hidden;}
  .pf{height:100%;border-radius:10px;transition:width .4s;background:var(--sky);}
  .pf.pdone{background:var(--green);}
  .pf.pover{background:var(--red);}
  .ca{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px;}
  .ca select{background:#F8FAFC;border:1px solid var(--border);border-radius:7px;
              padding:5px 7px;font-size:.74rem;flex:1;min-width:0;outline:none;cursor:pointer;color:var(--text);}
  .bsm{padding:5px 10px;font-size:.74rem;border-radius:6px;}
  .bcl{background:#F1F5F9;color:var(--sub);border:1px solid var(--border);border-radius:6px;
       padding:5px 10px;font-size:.74rem;cursor:pointer;font-weight:600;transition:all .18s;}
  .bcl:hover{background:#E2E8F0;}
  .bcl.active{background:#1E293B;color:#fff;border-color:#1E293B;}

  /* ── SUBTASKS ── */
  .sts{margin-top:11px;border-top:1px solid var(--border);padding-top:10px;}
  .sth{font-size:.73rem;font-weight:700;color:var(--sub);text-transform:uppercase;
       letter-spacing:.5px;margin-bottom:8px;}
  .sti{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:8px;
       padding:9px 11px;margin-bottom:6px;font-size:.79rem;}
  .stt{font-weight:600;line-height:1.3;}
  .stt.closed{text-decoration:line-through;color:var(--sub);}
  .stm{font-size:.68rem;color:var(--sub);margin-top:3px;}
  .std{font-size:.68rem;color:var(--sub);margin-top:3px;display:flex;gap:9px;}
  .stp{margin-top:5px;}
  .stp .pt{height:5px;}
  .sta{display:flex;gap:5px;margin-top:6px;}
  .bxs{padding:3px 8px;font-size:.7rem;border-radius:5px;border:none;cursor:pointer;font-weight:600;}
  .bxsc{background:#E2E8F0;color:var(--sub);}
  .bxsc:hover{background:#CBD5E1;}
  .bxsc.active{background:#1E293B;color:#fff;}
  .bxsd{background:#FEE2E2;color:var(--red);}
  .bxsd:hover{background:var(--red);color:#fff;}
  .asb{background:none;border:1px dashed #CBD5E1;border-radius:7px;color:var(--sub);
       padding:6px 10px;font-size:.74rem;cursor:pointer;width:100%;text-align:center;
       transition:all .18s;margin-top:4px;}
  .asb:hover{border-color:var(--sky);color:var(--sky);background:#F0F9FF;}

  /* ── MODAL ── */
  .mo{display:none;position:fixed;inset:0;background:rgba(15,23,42,.58);
      z-index:300;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  .mo.open{display:flex;}
  .md{background:#fff;border-radius:16px;padding:28px;width:530px;max-width:96vw;
      max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.28);
      animation:popIn .2s ease;}
  @keyframes popIn{from{transform:scale(.93);opacity:0}to{transform:scale(1);opacity:1}}
  .md h3{font-size:1.1rem;margin-bottom:18px;color:var(--navy);}
  .fr{margin-bottom:13px;}
  .fr label{display:block;font-size:.77rem;font-weight:600;color:var(--sub);
            margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;}
  .fr input,.fr textarea,.fr select{
    width:100%;padding:8px 11px;border:1px solid var(--border);
    border-radius:8px;font-size:.85rem;color:var(--text);
    outline:none;transition:border .2s;background:#fff;
  }
  .fr input:focus,.fr textarea:focus,.fr select:focus{border-color:var(--sky);}
  .fr textarea{resize:vertical;min-height:70px;}
  .fg2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .ma{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}

  /* ── IMPORT CONFIRM ── */
  #importConfirm{width:420px;}
  #importPreview{background:#F8FAFC;border:1px solid var(--border);border-radius:8px;
                 padding:12px;font-size:.8rem;color:var(--sub);margin:10px 0;max-height:180px;overflow-y:auto;}

  /* ── TOAST ── */
  .toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;
         border-radius:10px;padding:12px 18px;font-size:.84rem;font-weight:600;
         box-shadow:0 6px 24px rgba(0,0,0,.25);z-index:500;
         transform:translateY(60px);opacity:0;transition:all .3s ease;}
  .toast.show{transform:translateY(0);opacity:1;}
  .toast.sky{border-left:4px solid var(--sky);}
  .toast.red{border-left:4px solid var(--red);}
  .toast.green{border-left:4px solid var(--green);}

  /* ── PWA OFFLINE BANNER ── */
  #offlineBanner{
    display:none;position:fixed;top:var(--hdr-h);left:0;right:0;z-index:190;
    background:#854D0E;color:#FEF9C3;text-align:center;
    padding:6px;font-size:.8rem;font-weight:600;
  }

  /* ── RESPONSIVE ── */
  @media(max-width:1100px){.tc{width:calc(50% - 6px);}}
  @media(max-width:700px){
    .tc{width:100%;}.kpi-bar{grid-template-columns:1fr 1fr;}
    header{padding:0 12px;}.brand-name{font-size:.95rem;}
    .search-wrap input{width:130px;}
    .header-right{gap:5px;}
  }
  @media(max-width:480px){.kpi-bar{grid-template-columns:1fr 1fr;gap:9px;}}
</style>
</head>
<body>

<!-- OFFLINE BANNER -->
<div id="offlineBanner">&#9888; You are offline — Procto App is running from cache.</div>

<!-- HEADER (fixed) -->
<header>
  <div class="brand">
    <img id="brandLogo" src="" alt="Procto"/>
    <span class="brand-name">Procto <span>App</span></span>
  </div>

  <div class="header-right">
    <!-- Search -->
    <div class="search-wrap">
      <span class="si">&#128269;</span>
      <input type="text" id="searchInput" placeholder="Search tasks…" oninput="filterTasks()"/>
    </div>
    <!-- Filters -->
    <select class="fsel" id="catFilter" onchange="filterTasks()">
      <option value="">All Categories</option>
      <option>Design</option><option>Development</option><option>Marketing</option>
      <option>QA</option><option>DevOps</option><option>Management</option><option>Other</option>
    </select>
    <select class="fsel" id="urgFilter" onchange="filterTasks()">
      <option value="">All Urgency</option>
      <option>Low</option><option>Medium</option><option>High</option><option>Critical</option>
    </select>

    <div class="hdr-div"></div>

    <!-- Data management -->
    <button class="btn btn-ghost" onclick="exportData()" title="Export tasks as JSON backup">&#128229; Export</button>
    <button class="btn btn-ghost" onclick="triggerImport()" title="Import tasks from JSON backup">&#128228; Import</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImportFile(event)"/>

    <div class="hdr-div"></div>

    <!-- PDF + New Task -->
    <button class="btn btn-ghost" onclick="exportPDF()" title="Download dashboard as PDF">&#128196; PDF</button>
    <button class="btn btn-sky" onclick="openModal()">&#10010; New Task</button>

    <!-- Install PWA (shown dynamically) -->
    <button id="installBtn" title="Install Procto App">&#11015; Install App</button>
  </div>
</header>

<!-- KPI TILES -->
<div class="kpi-bar">
  <div class="kpi-tile t-pending">
    <div class="kpi-icon">&#9201;</div>
    <div class="kpi-info"><label>Pending</label><div class="kpi-val" id="kp">0</div></div>
  </div>
  <div class="kpi-tile t-inprog">
    <div class="kpi-icon">&#9889;</div>
    <div class="kpi-info"><label>In Progress</label><div class="kpi-val" id="ki">0</div></div>
  </div>
  <div class="kpi-tile t-done">
    <div class="kpi-icon">&#10003;</div>
    <div class="kpi-info"><label>Completed</label><div class="kpi-val" id="kd">0</div></div>
  </div>
  <div class="kpi-tile t-overdue">
    <div class="kpi-icon">&#9888;</div>
    <div class="kpi-info"><label>Overdue</label><div class="kpi-val" id="ko">0</div></div>
  </div>
</div>

<!-- KANBAN BOARD -->
<div class="main" id="kanbanMain">

  <div class="ks ks-pending">
    <div class="sh" onclick="toggleSec(this)">
      <div class="sh-left"><span>&#9201; Pending</span><span class="scnt" id="cp">0</span></div>
      <span class="chevron">&#9660;</span>
    </div>
    <div class="sb" id="sp"></div>
  </div>

  <div class="ks ks-inprog">
    <div class="sh" onclick="toggleSec(this)">
      <div class="sh-left"><span>&#9889; In Progress</span><span class="scnt" id="ci">0</span></div>
      <span class="chevron">&#9660;</span>
    </div>
    <div class="sb" id="si"></div>
  </div>

  <div class="ks ks-done">
    <div class="sh" onclick="toggleSec(this)">
      <div class="sh-left"><span>&#10003; Completed</span><span class="scnt" id="cd">0</span></div>
      <span class="chevron">&#9660;</span>
    </div>
    <div class="sb" id="sd"></div>
  </div>

</div>

<!-- ══ TASK MODAL ══ -->
<div class="mo" id="taskModal">
  <div class="md">
    <h3 id="mTitle">&#10010; New Task</h3>
    <div class="fr"><label>Task Title *</label>
      <input type="text" id="iTitle" placeholder="e.g. Design homepage mockup"/></div>
    <div class="fr"><label>Description</label>
      <textarea id="iDesc" placeholder="Briefly describe the task…"></textarea></div>
    <div class="fg2">
      <div class="fr"><label>Category</label>
        <select id="iCat"><option>Design</option><option>Development</option><option>Marketing</option>
          <option>QA</option><option>DevOps</option><option>Management</option><option>Other</option></select></div>
      <div class="fr"><label>Urgency</label>
        <select id="iUrg"><option>Low</option><option selected>Medium</option>
          <option>High</option><option>Critical</option></select></div>
    </div>
    <div class="fg2">
      <div class="fr"><label>Start Date *</label><input type="date" id="iStart"/></div>
      <div class="fr"><label>End Date *</label><input type="date" id="iEnd"/></div>
    </div>
    <div class="fr"><label>Status</label>
      <select id="iStatus">
        <option value="pending">Pending</option>
        <option value="inprog">In Progress</option>
        <option value="done">Completed</option>
      </select></div>
    <div class="ma">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-sky" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<!-- ══ SUBTASK MODAL ══ -->
<div class="mo" id="stModal">
  <div class="md" style="width:440px">
    <h3>&#10010; Add Sub-Task</h3>
    <input type="hidden" id="stPid"/>
    <div class="fr"><label>Sub-Task Title *</label>
      <input type="text" id="stTitle" placeholder="e.g. Create wireframe"/></div>
    <div class="fg2">
      <div class="fr"><label>Start Date</label><input type="date" id="stStart"/></div>
      <div class="fr"><label>End Date</label><input type="date" id="stEnd"/></div>
    </div>
    <div class="ma">
      <button class="btn btn-outline" onclick="closeStModal()">Cancel</button>
      <button class="btn btn-sky" onclick="saveSubTask()">Add Sub-Task</button>
    </div>
  </div>
</div>

<!-- ══ IMPORT CONFIRM MODAL ══ -->
<div class="mo" id="importModal">
  <div class="md" id="importConfirm">
    <h3>&#128228; Import Backup</h3>
    <p style="font-size:.85rem;color:var(--sub);margin-bottom:6px;">
      The following tasks will <strong>replace</strong> your current data:
    </p>
    <div id="importPreview"></div>
    <p style="font-size:.78rem;color:var(--red);font-weight:600;">
      &#9888; This will overwrite all existing tasks. Export first if needed.
    </p>
    <div class="ma">
      <button class="btn btn-outline" onclick="closeImportModal()">Cancel</button>
      <button class="btn btn-sky" id="confirmImportBtn" onclick="confirmImport()">
        &#10003; Yes, Import
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════

//  PWA — Manifest (Blob URL, works for both file:// and http://)
// ════════════════════════════════════════════════════
(function setupPWA(){
  // Build manifest with embedded icon
  const iconDataUrl = 'data:image/png;base64,' + LOGO_B64;
  const manifest = {
    name: 'Procto App',
    short_name: 'Procto',
    description: 'Project & Task Monitoring Dashboard',
    start_url: window.location.href,
    display: 'standalone',
    orientation: 'landscape',
    background_color: '#0F172A',
    theme_color: '#0F172A',
    icons: [
      { src: iconDataUrl, sizes: '64x64',   type: 'image/png', purpose: 'any maskable' },
      { src: iconDataUrl, sizes: '128x128',  type: 'image/png', purpose: 'any maskable' },
      { src: iconDataUrl, sizes: '192x192',  type: 'image/png', purpose: 'any maskable' },
      { src: iconDataUrl, sizes: '512x512',  type: 'image/png', purpose: 'any maskable' }
    ]
  };
  try {
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    const url  = URL.createObjectURL(blob);
    const link = document.createElement('link');
    link.rel   = 'manifest';
    link.href  = url;
    document.head.appendChild(link);
  } catch(e) { console.warn('Manifest setup failed:', e); }

  // Apple touch icon
  try {
    const apl  = document.createElement('link');
    apl.rel    = 'apple-touch-icon';
    apl.href   = iconDataUrl;
    document.head.appendChild(apl);
  } catch(e) {}
})();

(function registerSW(){
  if (!('serviceWorker' in navigator)) return;
  const swSrc = `
const CACHE = 'procto-sw-v1';
const ASSETS = []; // no external assets to precache for a single-file app
self.addEventListener('install', e => {
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => clients.claim())
  );
});
self.addEventListener('fetch', e => {
  // Pass-through: only cache CDN/external resources
  if (e.request.url.startsWith('chrome-extension:') ||
      e.request.url.startsWith('blob:')) return;
  e.respondWith(
    fetch(e.request)
      .then(res => {
        if (res && res.status === 200 && e.request.method === 'GET') {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return res;
      })
      .catch(() => caches.match(e.request))
  );
});
`;
  try {
    const blob = new Blob([swSrc], { type: 'application/javascript' });
    const url  = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url, { scope: './' })
      .then(reg => {
        console.log('[Procto SW] Registered. Scope:', reg.scope);
      })
      .catch(err => {
        // Expected on file:// protocol — not an error
        console.info('[Procto SW] Registration skipped (file:// or unsupported):', err.message);
      });
  } catch(e) { console.warn('[Procto SW] Setup error:', e); }
})();

let deferredInstall = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstall = e;
  document.getElementById('installBtn').style.display = 'inline-flex';
});
window.addEventListener('appinstalled', () => {
  deferredInstall = null;
  document.getElementById('installBtn').style.display = 'none';
  showToast('Procto App installed on your device!', 'green');
});
document.getElementById('installBtn').addEventListener('click', async () => {
  if (!deferredInstall) return;
  deferredInstall.prompt();
  const { outcome } = await deferredInstall.userChoice;
  deferredInstall = null;
  document.getElementById('installBtn').style.display = 'none';
  if (outcome === 'accepted') showToast('Procto App installed!', 'green');
});

let tasks  = [];
let editId = null;
let pendingImport = null;

function loadTasks(){
  try { tasks = JSON.parse(localStorage.getItem('procto_v2') || '[]'); }
  catch(e) { tasks = []; }
}
function saveTasks(){ localStorage.setItem('procto_v2', JSON.stringify(tasks)); }
function genId(){ return 'T' + Date.now() + '_' + Math.random().toString(36).substr(2,5); }
function nowStr(){
  const d = new Date();
  return d.toLocaleDateString('en-MY',{day:'2-digit',month:'short',year:'numeric'}) +
    ' ' + d.toLocaleTimeString('en-MY',{hour:'2-digit',minute:'2-digit'});
}
function todayStr(){ return new Date().toISOString().split('T')[0]; }
function addDays(base, n){
  const d = new Date(base); d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}

//  EXPORT DATA (JSON backup)
// ════════════════════════════════════════════════════
function exportData(){
  if(!tasks.length){ showToast('No tasks to export', 'red'); return; }
  const payload = {
    app:        'Procto App',
    version:    2,
    exportedAt: new Date().toISOString(),
    taskCount:  tasks.length,
    tasks
  };
  const json = JSON.stringify(payload, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'Procto_Backup_' + todayStr() + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('Exported ' + tasks.length + ' tasks to JSON', 'sky');
}

// ════════════════════════════════════════════════════
//  IMPORT DATA (JSON restore)
// ════════════════════════════════════════════════════
function triggerImport(){
  document.getElementById('importFile').value = '';
  document.getElementById('importFile').click();
}

function handleImportFile(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    try {
      const raw = JSON.parse(evt.target.result);
      // Accept both wrapped format { tasks: [...] } and plain array
      const imported = Array.isArray(raw) ? raw : (raw.tasks || null);
      if(!imported || !Array.isArray(imported)){
        showToast('Invalid backup file — no task array found', 'red'); return;
      }
      // Validate at least first item looks like a task
      if(imported.length > 0 && !imported[0].id){
        showToast('File does not appear to be a Procto backup', 'red'); return;
      }
      pendingImport = imported;
      // Build preview
      const summary = imported.slice(0, 6).map(t =>
        `<div style="padding:3px 0;border-bottom:1px solid #E2E8F0;">
          <strong>${escHtml(t.title||'Untitled')}</strong>
          <span style="color:var(--sky);margin-left:6px;font-size:.75rem;">${t.status||'pending'}</span>
        </div>`
      ).join('') + (imported.length > 6
        ? `<div style="padding:4px 0;color:var(--sub);font-style:italic;">…and ${imported.length - 6} more</div>`
        : '');
      document.getElementById('importPreview').innerHTML =
        `<div style="margin-bottom:6px;font-weight:700;">${imported.length} task(s) in file:</div>` + summary;
      document.getElementById('importModal').classList.add('open');
    } catch(err){
      showToast('Could not parse JSON file', 'red');
    }
  };
  reader.readAsText(file);
}

function closeImportModal(){
  pendingImport = null;
  document.getElementById('importModal').classList.remove('open');
}

function confirmImport(){
  if(!pendingImport) return;
  tasks = pendingImport;
  pendingImport = null;
  saveTasks();
  closeImportModal();
  render();
  showToast('Imported ' + tasks.length + ' tasks successfully!', 'green');
}

// ════════════════════════════════════════════════════
//  PROGRESS
// ════════════════════════════════════════════════════
function calcProg(start, end, closed){
  if(!start || !end) return { pct:0, over:false, lbl:'No dates set' };
  const s = new Date(start), e = new Date(end), t = new Date();
  if(closed) return { pct:100, over:false, lbl:'100% (Closed)' };
  if(t < s)  return { pct:0,   over:false, lbl:'Not started yet' };
  if(t > e){
    const d = Math.ceil((t - e) / 86400000);
    return { pct:100, over:true, lbl:'Overdue by ' + d + 'd' };
  }
  const pct = Math.round(((t - s) / (e - s)) * 100);
  return { pct, over:false, lbl: pct + '% timeline' };
}

function isOverdue(t){
  if(!t.end || t.closed || t.status === 'done') return false;
  return new Date() > new Date(t.end);
}

function stRollup(t){
  if(!t.subtasks || !t.subtasks.length) return null;
  const total = t.subtasks.length;
  const done  = t.subtasks.filter(s => s.closed).length;
  return { pct: Math.round((done / total) * 100), done, total };
}

// ════════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════════
function render(filtered){
  const src = filtered || tasks;
  ['sp','si','sd'].forEach(id => { document.getElementById(id).innerHTML = ''; });
  src.forEach(task => {
    const card = buildCard(task);
    const map  = { pending:'sp', inprog:'si', done:'sd' };
    const c    = document.getElementById(map[task.status] || 'sp');
    if(c) c.appendChild(card);
  });
  ['sp','si','sd'].forEach(id => {
    const c = document.getElementById(id);
    if(!c.querySelector('.tc')) c.innerHTML = '<div class="empty-msg">No tasks here</div>';
  });
  updateKPI();
  updateCounts();
}

function buildCard(task){
  const div = document.createElement('div');
  const ov  = isOverdue(task);
  div.className = 'tc' + (task.closed ? ' closed':'') + (ov ? ' overdue-c':'');
  div.dataset.id = task.id;

  const prog = calcProg(task.start, task.end, task.closed || task.status === 'done');
  const pfC  = (task.status === 'done' || task.closed) ? 'pdone' : (prog.over ? 'pover' : '');
  const ru   = stRollup(task);
  const urgMap = { Low:'ul', Medium:'um', High:'uh', Critical:'uc' };
  const uc   = urgMap[task.urgency] || 'um';

  div.innerHTML = `
    <div class="ct">
      <div class="ttl">${escHtml(task.title)}</div>
      <span class="ub ${uc}">${task.urgency||'Medium'}</span>
    </div>
    <span class="catb">${escHtml(task.category||'Other')}</span>
    <div class="tmeta">&#128197; Created: ${task.created}</div>
    ${task.desc ? `<div class="tdesc">${escHtml(task.desc)}</div>` : ''}
    <div class="dr">
      <span>&#128197; ${task.start||'No start'}</span>
      <span>&#9873; ${task.end||'No end'}</span>
    </div>
    <div class="pw">
      <div class="pl"><span>Timeline</span><span>${prog.lbl}</span></div>
      <div class="pt"><div class="pf ${pfC}" style="width:${prog.pct}%"></div></div>
    </div>
    ${ru ? `<div class="pw">
      <div class="pl"><span>Sub-tasks (${ru.done}/${ru.total})</span><span>${ru.pct}%</span></div>
      <div class="pt"><div class="pf pdone" style="width:${ru.pct}%"></div></div>
    </div>` : ''}
    <div class="ca">
      <select onchange="changeStatus('${task.id}',this.value)">
        <option value="pending"${task.status==='pending'?' selected':''}>&#9201; Pending</option>
        <option value="inprog"${task.status==='inprog'?' selected':''}>&#9889; In Progress</option>
        <option value="done"${task.status==='done'?' selected':''}>&#10003; Completed</option>
      </select>
      <button class="bcl${task.closed?' active':''}" onclick="toggleClose('${task.id}')">
        ${task.closed ? '&#10004; Closed' : 'Close'}
      </button>
      <button class="btn btn-outline bsm" onclick="editTask('${task.id}')">Edit</button>
      <button class="btn btn-red bsm" onclick="deleteTask('${task.id}')">Delete</button>
    </div>
    <div class="sts">
      <div class="sth">Sub-Tasks</div>
      <div id="sts-${task.id}">${buildSubtasks(task)}</div>
      <button class="asb" onclick="openStModal('${task.id}')">&#10010; Add Sub-Task</button>
    </div>`;
  return div;
}

function buildSubtasks(task){
  if(!task.subtasks || !task.subtasks.length) return '';
  return task.subtasks.map(st => {
    const p   = calcProg(st.start, st.end, st.closed);
    const pfC = st.closed ? 'pdone' : (p.over ? 'pover' : '');
    return `<div class="sti">
      <div class="stt${st.closed?' closed':''}">${escHtml(st.title)}</div>
      <div class="stm">Created: ${st.created}</div>
      ${(st.start||st.end) ? `<div class="std"><span>&#128197; ${st.start||'?'}</span><span>&#9873; ${st.end||'?'}</span></div>` : ''}
      <div class="stp"><div class="pt"><div class="pf ${pfC}" style="width:${p.pct}%"></div></div></div>
      <div class="sta">
        <button class="bxs bxsc${st.closed?' active':''}" onclick="toggleStClose('${task.id}','${st.id}')">
          ${st.closed ? '&#10004; Done' : 'Close'}
        </button>
        <button class="bxs bxsd" onclick="deleteSubTask('${task.id}','${st.id}')">&#128465; Del</button>
      </div>
    </div>`;
  }).join('');
}

function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateKPI(){
  document.getElementById('kp').textContent = tasks.filter(t => t.status==='pending').length;
  document.getElementById('ki').textContent = tasks.filter(t => t.status==='inprog').length;
  document.getElementById('kd').textContent = tasks.filter(t => t.status==='done').length;
  document.getElementById('ko').textContent = tasks.filter(t => isOverdue(t)).length;
}

function updateCounts(){
  const m = { sp:'cp', si:'ci', sd:'cd' };
  Object.entries(m).forEach(([sb, sc]) => {
    document.getElementById(sc).textContent =
      document.getElementById(sb).querySelectorAll('.tc').length;
  });
}

// ════════════════════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════════════════════
function changeStatus(id, status){
  const t = tasks.find(x => x.id === id); if(!t) return;
  t.status = status;
  saveTasks(); render();
  showToast('Moved to ' + {pending:'Pending',inprog:'In Progress',done:'Completed'}[status], 'sky');
}

function toggleClose(id){
  const t = tasks.find(x => x.id === id); if(!t) return;
  t.closed = !t.closed;
  saveTasks(); render();
  showToast(t.closed ? 'Task closed' : 'Task reopened', 'sky');
}

function toggleStClose(pid, sid){
  const t = tasks.find(x => x.id === pid); if(!t || !t.subtasks) return;
  const st = t.subtasks.find(s => s.id === sid); if(!st) return;
  st.closed = !st.closed;
  saveTasks(); render();
}

function deleteTask(id){
  if(!confirm('Delete this task permanently?')) return;
  tasks = tasks.filter(x => x.id !== id);
  saveTasks(); render();
  showToast('Task deleted', 'red');
}

function deleteSubTask(pid, sid){
  const t = tasks.find(x => x.id === pid); if(!t) return;
  t.subtasks = (t.subtasks || []).filter(s => s.id !== sid);
  saveTasks(); render();
}

function editTask(id){
  editId = id;
  const t = tasks.find(x => x.id === id); if(!t) return;
  document.getElementById('iTitle').value  = t.title    || '';
  document.getElementById('iDesc').value   = t.desc     || '';
  document.getElementById('iCat').value    = t.category || 'Other';
  document.getElementById('iUrg').value    = t.urgency  || 'Medium';
  document.getElementById('iStart').value  = t.start    || '';
  document.getElementById('iEnd').value    = t.end      || '';
  document.getElementById('iStatus').value = t.status   || 'pending';
  document.getElementById('mTitle').textContent = '✏️ Edit Task';
  document.getElementById('taskModal').classList.add('open');
}

// ════════════════════════════════════════════════════
//  MODAL — TASK
// ════════════════════════════════════════════════════
function openModal(){
  editId = null;
  document.getElementById('iTitle').value  = '';
  document.getElementById('iDesc').value   = '';
  document.getElementById('iCat').value    = 'Design';
  document.getElementById('iUrg').value    = 'Medium';
  document.getElementById('iStart').value  = todayStr();
  document.getElementById('iEnd').value    = '';
  document.getElementById('iStatus').value = 'pending';
  document.getElementById('mTitle').textContent = '✚ New Task';
  document.getElementById('taskModal').classList.add('open');
}
function closeModal(){ document.getElementById('taskModal').classList.remove('open'); }

function saveTask(){
  const title = document.getElementById('iTitle').value.trim();
  if(!title){ showToast('Task title is required', 'red'); return; }
  const start = document.getElementById('iStart').value;
  const end   = document.getElementById('iEnd').value;
  if(start && end && end < start){ showToast('End date must be after start date', 'red'); return; }
  if(editId){
    const t = tasks.find(x => x.id === editId);
    if(t){
      t.title    = title;
      t.desc     = document.getElementById('iDesc').value.trim();
      t.category = document.getElementById('iCat').value;
      t.urgency  = document.getElementById('iUrg').value;
      t.start    = start;
      t.end      = end;
      t.status   = document.getElementById('iStatus').value;
    }
    showToast('Task updated!', 'sky');
  } else {
    tasks.push({
      id:       genId(),
      title,
      desc:     document.getElementById('iDesc').value.trim(),
      category: document.getElementById('iCat').value,
      urgency:  document.getElementById('iUrg').value,
      start, end,
      status:   document.getElementById('iStatus').value,
      created:  nowStr(),
      closed:   false,
      subtasks: []
    });
    showToast('Task created!', 'sky');
  }
  saveTasks(); closeModal(); render();
}

// ════════════════════════════════════════════════════
//  MODAL — SUBTASK
// ════════════════════════════════════════════════════
function openStModal(pid){
  document.getElementById('stPid').value   = pid;
  document.getElementById('stTitle').value = '';
  document.getElementById('stStart').value = todayStr();
  document.getElementById('stEnd').value   = '';
  document.getElementById('stModal').classList.add('open');
}
function closeStModal(){ document.getElementById('stModal').classList.remove('open'); }

function saveSubTask(){
  const pid   = document.getElementById('stPid').value;
  const title = document.getElementById('stTitle').value.trim();
  if(!title){ showToast('Sub-task title is required', 'red'); return; }
  const t = tasks.find(x => x.id === pid); if(!t) return;
  if(!t.subtasks) t.subtasks = [];
  t.subtasks.push({
    id:      genId(),
    title,
    start:   document.getElementById('stStart').value,
    end:     document.getElementById('stEnd').value,
    created: nowStr(),
    closed:  false
  });
  saveTasks(); closeStModal(); render();
  showToast('Sub-task added!', 'sky');
}

// ════════════════════════════════════════════════════
//  SEARCH / FILTER
// ════════════════════════════════════════════════════
function filterTasks(){
  const q   = document.getElementById('searchInput').value.trim().toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const urg = document.getElementById('urgFilter').value;
  const filtered = tasks.filter(t => {
    const mq = !q   || t.title.toLowerCase().includes(q) || (t.desc||'').toLowerCase().includes(q);
    const mc = !cat || t.category === cat;
    const mu = !urg || t.urgency  === urg;
    return mq && mc && mu;
  });
  render(filtered);
}
